<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Product Production Loop</title>
  <desc id="desc">A loop diagram showing problem framing, product UI, backend orchestration, retrieval, tool use, evaluation, cost control, and deployment.</desc>
  <rect width="1200" height="720" rx="36" fill="#07111F"/>
  <defs>
    <linearGradient id="ring" x1="160" y1="130" x2="1040" y2="590" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.48" stop-color="#34D399"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="54" y="54" width="1092" height="612" rx="30" fill="#0B1020" stroke="#1F2A44" stroke-width="2"/>
  <text x="90" y="108" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">The Production AI Loop</text>
  <text x="90" y="136" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="16">A good AI product is a loop of product decisions, system design, measurement, and iteration.</text>
  <circle cx="600" cy="376" r="196" stroke="url(#ring)" stroke-width="18" opacity="0.9" filter="url(#glow)"/>
  <circle cx="600" cy="376" r="118" fill="#08111F" stroke="#263653" stroke-width="2"/>
  <text x="540" y="360" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Real User</text>
  <text x="515" y="390" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="14">Problem solved repeatedly</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="118" y="204" width="244" height="82" rx="18" fill="#101B33" stroke="#263653"/>
    <text x="146" y="238" fill="#E2E8F0" font-size="18" font-weight="700">1. Frame Problem</text>
    <text x="146" y="263" fill="#94A3B8" font-size="13">Who needs help and what outcome matters?</text>
    <rect x="420" y="128" width="244" height="82" rx="18" fill="#101B33" stroke="#263653"/>
    <text x="448" y="162" fill="#E2E8F0" font-size="18" font-weight="700">2. Build UI</text>
    <text x="448" y="187" fill="#94A3B8" font-size="13">States, controls, feedback, and trust.</text>
    <rect x="738" y="204" width="244" height="82" rx="18" fill="#101B33" stroke="#263653"/>
    <text x="766" y="238" fill="#E2E8F0" font-size="18" font-weight="700">3. Orchestrate</text>
    <text x="766" y="263" fill="#94A3B8" font-size="13">Auth, APIs, context, tools, and jobs.</text>
    <rect x="826" y="434" width="244" height="82" rx="18" fill="#101B33" stroke="#263653"/>
    <text x="854" y="468" fill="#E2E8F0" font-size="18" font-weight="700">4. Evaluate</text>
    <text x="854" y="493" fill="#94A3B8" font-size="13">Quality, cost, latency, and regressions.</text>
    <rect x="430" y="548" width="244" height="82" rx="18" fill="#101B33" stroke="#263653"/>
    <text x="458" y="582" fill="#E2E8F0" font-size="18" font-weight="700">5. Deploy</text>
    <text x="458" y="607" fill="#94A3B8" font-size="13">Ship, monitor, learn, and iterate.</text>
    <rect x="130" y="434" width="244" height="82" rx="18" fill="#101B33" stroke="#263653"/>
    <text x="158" y="468" fill="#E2E8F0" font-size="18" font-weight="700">6. Improve</text>
    <text x="158" y="493" fill="#94A3B8" font-size="13">Update data, prompts, tools, and UX.</text>
  </g>
</svg>
