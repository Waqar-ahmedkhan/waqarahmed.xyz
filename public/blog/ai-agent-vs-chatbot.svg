<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent Versus Chatbot</title>
  <desc id="desc">A comparison diagram showing how a chatbot responds to messages while an AI agent plans, retrieves knowledge, uses tools, remembers context, and completes workflows.</desc>
  <rect width="1200" height="720" rx="36" fill="#050816"/>
  <rect x="48" y="48" width="1104" height="624" rx="28" fill="#0B1020" stroke="#263653" stroke-width="2"/>
  <text x="82" y="108" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Chatbot vs AI Agent</text>
  <text x="82" y="138" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="16">A chatbot answers. An agent works through a goal using memory, tools, retrieval, planning, and feedback.</text>
  <defs>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#34D399"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111B33"/>
      <stop offset="1" stop-color="#08111F"/>
    </linearGradient>
  </defs>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="90" y="190" width="430" height="404" rx="24" fill="#08111F" stroke="#263653"/>
    <text x="124" y="238" fill="#E2E8F0" font-size="28" font-weight="700">Simple Chatbot</text>
    <text x="124" y="270" fill="#94A3B8" font-size="15">Useful for conversation and quick answers.</text>
    <rect x="132" y="318" width="312" height="64" rx="16" fill="url(#card)" stroke="#263653"/>
    <text x="160" y="356" fill="#E2E8F0" font-size="17" font-weight="700">User message</text>
    <path d="M288 392V432" stroke="#38BDF8" stroke-width="4" stroke-linecap="round"/>
    <rect x="132" y="440" width="312" height="64" rx="16" fill="url(#card)" stroke="#263653"/>
    <text x="160" y="478" fill="#E2E8F0" font-size="17" font-weight="700">Model response</text>
    <text x="132" y="548" fill="#94A3B8" font-size="14">Limited context. No durable memory.</text>
    <text x="132" y="574" fill="#94A3B8" font-size="14">Usually no tools, planning, or workflow state.</text>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="680" y="190" width="430" height="404" rx="24" fill="#08111F" stroke="#263653"/>
    <text x="714" y="238" fill="#E2E8F0" font-size="28" font-weight="700">AI Agent</text>
    <text x="714" y="270" fill="#94A3B8" font-size="15">Built to complete goals through controlled steps.</text>
    <circle cx="895" cy="406" r="78" fill="#07111F" stroke="url(#agent)" stroke-width="8"/>
    <text x="856" y="400" fill="#E2E8F0" font-size="20" font-weight="700">Agent</text>
    <text x="842" y="426" fill="#94A3B8" font-size="13">decides next step</text>
    <rect x="724" y="318" width="120" height="54" rx="14" fill="url(#card)" stroke="#263653"/>
    <text x="750" y="351" fill="#E2E8F0" font-size="15" font-weight="700">Plan</text>
    <rect x="946" y="318" width="120" height="54" rx="14" fill="url(#card)" stroke="#263653"/>
    <text x="974" y="351" fill="#E2E8F0" font-size="15" font-weight="700">Tools</text>
    <rect x="724" y="474" width="120" height="54" rx="14" fill="url(#card)" stroke="#263653"/>
    <text x="754" y="507" fill="#E2E8F0" font-size="15" font-weight="700">RAG</text>
    <rect x="946" y="474" width="120" height="54" rx="14" fill="url(#card)" stroke="#263653"/>
    <text x="972" y="507" fill="#E2E8F0" font-size="15" font-weight="700">Memory</text>
    <path d="M844 344C868 330 894 326 918 344" stroke="#38BDF8" stroke-width="3" stroke-linecap="round"/>
    <path d="M946 372C962 396 962 430 946 454" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
    <path d="M918 502C894 516 868 516 844 502" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
    <path d="M844 454C828 430 828 396 844 372" stroke="#38BDF8" stroke-width="3" stroke-linecap="round"/>
  </g>
  <path d="M552 390H642" stroke="url(#agent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M642 390L612 362M642 390L612 418" stroke="#34D399" stroke-width="6" stroke-linecap="round"/>
  <text x="535" y="338" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Harder because it acts</text>
  <text x="502" y="365" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="13">More power means more engineering risk.</text>
</svg>
